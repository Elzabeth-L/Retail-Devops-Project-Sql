apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata: 
  name: retail-route
spec:
  parentRefs:
    name: micro-gateway
  rules:
  - matches:
      - path:
          type: PathPrefix
          value: /retail
    filters:
      type: URLRewrite
      URLRewrite:
        path:
          type: ReplacePrefixMatch
          ReplacePrefixMatch: /
    backendRefs:
      - name: capsule-service
        port: 80
